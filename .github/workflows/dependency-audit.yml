# 의존성 능동 감사 — 표준: Claude-Opus-bluevlad/standards/security/SUPPLY_CHAIN_HARDENING.md
# Trivy 미사용(공급망 침해 이력). Python=pip-audit(PyPA). report-only.
name: Dependency Audit

on:
  push:
    branches: [main]
    paths:
      - "requirements.txt"
      - ".github/workflows/dependency-audit.yml"
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 1"   # 매주 월 09:00 KST
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install pip-audit (PyPA)
        run: python -m pip install --upgrade pip pip-audit
      - name: Audit Python dependencies (report-only)
        run: |
          echo "## pip-audit" >> "$GITHUB_STEP_SUMMARY"
          if pip-audit -r requirements.txt --desc 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"; then
            echo -e "\n✅ 알려진 취약점 없음" >> "$GITHUB_STEP_SUMMARY"
          else
            echo -e "\n⚠️ 취약점 발견 (비차단) — Dependabot PR 확인" >> "$GITHUB_STEP_SUMMARY"
          fi
