# 테넌트 설정
# 각 테넌트의 데이터 소스, 발송 스케줄, 이메일 설정을 정의합니다.
# brand 섹션은 참조 문서용입니다. 실제 브랜드 설정은 각 테넌트의 config.py가 source of truth입니다.

tenants:
  allergy-insight:
    display_name: "AllergyInsight 알러지 뉴스 브리핑"
    description: "알러지 뉴스 & 논문 브리핑 (HealthPulse 통합)"
    api_base_url: "${ALLERGY_INSIGHT_API_URL}"
    email_subject_prefix: "[AllergyInsight]"
    email_template: "allergy_insight/daily_report.html"
    schedule:
      collect_hour: 7
      collect_minute: 30
      send_hour: 8
      send_minute: 30
    is_active: true
    brand:
      primary_color: "#2e7d32"
      primary_color_dark: "#1b5e20"
      accent_color: "#66bb6a"
      color_scheme: "Green"
    # Phase 4: 진단키트 담당부서 주간회의용 1페이지 인사이트 브리프 설정
    # 부서가 직접 편집 가능한 watch_list. 발송은 Phase 6에서 cron 등록 예정.
    insight_brief:
      enabled: false  # Phase 6 cron 통합 전까지 false
      schedule:
        weekly_day_of_week: "mon"
        weekly_send_hour: 7
        weekly_send_minute: 0
      subscribers_group: "diagnostic_kit_team"
      lookback_weeks: 12
      watch_list:
        keywords:
          - "면역글로불린E"
          - "IgE"
          - "피부단자검사"
          - "MAST"
          - "ImmunoCAP"
          - "식품알레르기 표시"
          - "아나필락시스"
          - "알레르겐"
          - "체외진단"
          - "동반진단"
        companies:
          - "녹십자MS"
          - "씨젠"
          - "휴마시스"
          - "Thermo Fisher"
          - "Phadia"
        entities:
          - "식약처"
          - "MFDS"
          - "FDA"
          - "PMDA"
          - "EMA"
        categories_of_interest:
          - "산업/규제"
          - "임상/치료"

  standup:
    display_name: "StandUp 주간 인사이트"
    description: "LogAnalyzer · GitHub QA · Auto-Tobe 통합 주간 인사이트 (StandUp 합성)"
    api_base_url: "${STANDUP_API_URL}"
    email_subject_prefix: "[StandUp]"
    email_template: "standup/weekly_report.html"
    schedule:
      # weekly only — 매주 월요일 09:30 발송
      weekly_day_of_week: "mon"
      weekly_collect_hour: 8
      weekly_collect_minute: 0
      weekly_send_hour: 9
      weekly_send_minute: 30
    is_active: true
    brand:
      primary_color: "#ef4444"
      primary_color_dark: "#b91c1c"
      accent_color: "#fca5a5"
      color_scheme: "Red"

  tech-briefing:
    display_name: "TechBriefing AI 학습·커리어 일일 브리핑"
    description: "AI 교육과정 · 세미나 · 정책 · 뉴스 큐레이션 일일 브리핑 (SkillRadar 백엔드 API 연동)"
    api_base_url: "${SKILLRADAR_API_URL}"
    email_subject_prefix: "[TechBriefing]"
    email_template: "tech_briefing/daily_report.html"
    schedule:
      collect_hour: 6
      collect_minute: 30
      send_hour: 8
      send_minute: 0
      # weekly — 매주 금요일 (월~금 daily 이력 집계 + SkillRadar 공개 통계)
      weekly_day_of_week: "fri"
      weekly_collect_hour: 6
      weekly_collect_minute: 0
      weekly_send_hour: 9
      weekly_send_minute: 30
    is_active: true
    brand:
      primary_color: "#1d4ed8"
      primary_color_dark: "#1e3a8a"
      accent_color: "#06b6d4"
      color_scheme: "Blue/Cyan"
